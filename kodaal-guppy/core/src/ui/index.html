<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kodaal Guppy</title>
  <link rel="icon" type="image/png" href="/assets/logo-light.png">
  <style>
    :root {
      --kg-charcoal: #1f2426;
      --kg-charcoal-deep: #15191b;
      --kg-charcoal-soft: #2a3033;
      --kg-paper: #f4f1ea;
      --kg-paper-warm: #ebe6dc;
      --kg-paper-cool: #fbf9f4;
      --kg-ink: #0c0f10;
      --kg-ink-soft: #3d4548;
      --kg-teal: #1f8a8a;
      --kg-teal-deep: #176868;
      --kg-teal-soft: #5fb0b0;
      --kg-teal-wash: #e3efef;
      --kg-rule: #3a4144;
      --kg-rule-soft: #d6cfbf;
      --kg-rule-softer: #e3ddce;
      --kg-amber: #b8860b;
      --kg-red: #923a3a;
      --kg-green: #3a7a4d;
      --kg-yellow: #d4a82a;
      --font-display: Georgia, "Times New Roman", serif;
      --font-body: "Segoe UI", Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: "Cascadia Code", "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
    }

    html[data-theme="light"] {
      --bg: var(--kg-paper-cool);
      --shell: var(--kg-paper);
      --surface: var(--kg-paper-cool);
      --surface-2: var(--kg-paper-warm);
      --surface-dark: var(--kg-charcoal);
      --text: var(--kg-ink);
      --muted: var(--kg-ink-soft);
      --border: var(--kg-rule-soft);
      --border-strong: var(--kg-rule);
      --accent: var(--kg-teal);
      --accent-strong: var(--kg-teal-deep);
      --accent-wash: var(--kg-teal-wash);
      color-scheme: light;
    }

    html[data-theme="dark"] {
      --bg: #15191b;
      --shell: #1f2426;
      --surface: #202628;
      --surface-2: #2a3033;
      --surface-dark: #0c0f10;
      --text: #f4f1ea;
      --muted: #aab3b1;
      --border: #3a4144;
      --border-strong: #5a6265;
      --accent: #5fb0b0;
      --accent-strong: #5fb0b0;
      --accent-wash: #163536;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .pause-banner {
      min-height: 34px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff8e0;
      color: var(--kg-charcoal-deep);
      border-bottom: 1px solid var(--kg-yellow);
      font-size: 12.5px;
    }

    html[data-theme="dark"] .pause-banner {
      background: #342b13;
      color: var(--text);
    }

    .pause-banner.visible { display: flex; }

    .topbar {
      height: 56px;
      flex: 0 0 56px;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 20px;
      background: var(--shell);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      width: 220px;
      flex: 0 0 220px;
      display: flex;
      align-items: center;
      color: var(--text);
      white-space: nowrap;
    }

    .brand-logo {
      width: 178px;
      height: 42px;
      display: block;
      object-fit: contain;
      object-position: left center;
    }

    .brand-logo-dark { display: none; }

    html[data-theme="dark"] .brand-logo-light { display: none; }

    html[data-theme="dark"] .brand-logo-dark { display: block; }

    .searchbar {
      max-width: 672px;
      height: 36px;
      flex: 1 1 280px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .searchbar input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
    }

    .searchbar input::placeholder { color: color-mix(in srgb, var(--muted) 70%, transparent); }

    .searchbar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .keycap {
      min-width: 24px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      position: relative;
    }

    .capture {
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      background: transparent;
    }

    .capture.paused {
      background: #fff8e0;
    }

    html[data-theme="dark"] .capture.paused { background: #342b13; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--kg-green);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--kg-green) 16%, transparent);
    }

    .capture.paused .status-dot {
      background: var(--kg-yellow);
      box-shadow: none;
    }

    .capture span:last-child {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
    }

    .square-icon {
      width: 32px;
      height: 32px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      background: transparent;
    }

    .square-icon:hover, .capture:hover {
      background: color-mix(in srgb, var(--text) 4%, transparent);
    }

    .settings-menu {
      position: absolute;
      top: 40px;
      right: 0;
      width: 220px;
      display: none;
      z-index: 40;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .settings-menu.visible { display: block; }

    .menu-row {
      min-height: 32px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 2px;
      color: var(--text);
      font-size: 12px;
    }

    button.menu-row:hover {
      background: color-mix(in srgb, var(--text) 5%, transparent);
    }

    .menu-row.active {
      color: var(--accent-strong);
      background: var(--accent-wash);
    }

    .menu-label {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

    .body {
      min-height: 0;
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      flex: 0 0 240px;
      overflow-y: auto;
      background: var(--shell);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
    }

    .app.sidebar-hidden .sidebar {
      display: none;
    }

    .sidebar-toggle {
      flex: 0 0 32px;
    }

    .nav-group {
      margin-bottom: 24px;
    }

    .nav-item {
      width: 100%;
      height: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px;
      border-radius: 2px;
      color: var(--muted);
      text-align: left;
    }

    .nav-item:hover {
      background: color-mix(in srgb, var(--text) 4%, transparent);
    }

    .nav-item.active {
      background: var(--accent-wash);
      color: var(--accent-strong);
      font-weight: 600;
    }

    .projects-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 10px 6px;
    }

    .projects-toolbar.hidden {
      display: none;
    }

    .project-select-all {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .project-select-all input,
    .project-checkbox {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .project-bulk-delete {
      height: 24px;
      padding: 0 8px;
      border: 1px solid color-mix(in srgb, var(--danger, #b42318) 35%, transparent);
      border-radius: 4px;
      background: transparent;
      color: var(--danger, #b42318);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .project-bulk-delete:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .project-nav-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-left: 6px;
    }

    .project-nav-row .nav-item {
      flex: 1;
      min-width: 0;
    }

    .project-nav-row.selected {
      background: color-mix(in srgb, var(--accent-wash) 65%, transparent);
      border-radius: 4px;
    }

    .project-actions {
      position: relative;
      flex: 0 0 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .project-more {
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      opacity: 0.6;
    }

    .project-nav-row:hover .project-more,
    .project-nav-row:focus-within .project-more {
      opacity: 1;
    }

    .project-more:hover,
    .project-more.active {
      color: var(--accent-strong);
      background: color-mix(in srgb, var(--text) 5%, transparent);
    }

    .project-actions .more-menu {
      top: 28px;
      width: 160px;
      z-index: 45;
    }

    .nav-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .count {
      color: color-mix(in srgb, var(--muted) 70%, transparent);
      font-family: var(--font-mono);
      font-size: 10px;
    }

    .section-head {
      width: 100%;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      color: var(--muted);
      text-align: left;
    }

    .section-title {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

    .badge {
      min-width: 20px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      padding: 0 6px;
      border-radius: 2px;
      background: var(--surface-2);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9px;
    }

    .project-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: var(--accent);
    }

    .local-panel {
      margin-top: 26px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
    }

    .local-title {
      margin-bottom: 9px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
    }

    .kv-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .kv-row strong {
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
    }

    .main {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .page-head {
      flex: 0 0 auto;
      padding: 24px 28px 16px;
      background: var(--bg);
    }

    .eyebrow {
      margin-bottom: 8px;
      color: var(--accent-strong);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 32px;
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: 0;
    }

    .list-count {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      white-space: nowrap;
    }

    .list-count strong {
      color: var(--text);
      font-weight: 600;
    }

    .filterbar {
      min-height: 56px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 28px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .select-all {
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      user-select: none;
    }

    .select-all input, .prompt-checkbox {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .bulk-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 32px;
      padding-left: 4px;
      color: var(--muted);
    }

    .bulk-count {
      min-width: 70px;
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .icon-action {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--muted);
    }

    .icon-action:hover, .icon-action.active {
      color: var(--accent-strong);
    }

    .icon-action:disabled {
      color: var(--border-strong);
      cursor: default;
    }

    .icon-action.danger:hover {
      color: var(--kg-red);
    }

    .filter-button, .sort-button {
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);
      color: var(--muted);
      font-size: 12px;
    }

    .filter-button:hover, .sort-button:hover {
      background: var(--surface-2);
    }

    .filter-button.active {
      background: var(--surface-dark);
      border-color: var(--surface-dark);
      color: var(--kg-paper);
    }

    .filter-button.favorite.active {
      color: var(--kg-paper);
    }

    .clear-button {
      height: 32px;
      padding: 0 12px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

    .sort-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .sort-label {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .sort-menu {
      position: absolute;
      right: 0;
      top: 38px;
      min-width: 160px;
      display: none;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      z-index: 30;
    }

    .sort-menu.visible { display: block; }

    .content {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
    }

    .prompt-card {
      position: relative;
      padding: 16px 28px 16px 26px;
      border-bottom: 1px solid var(--border);
      border-left: 2px solid transparent;
      background: var(--surface);
      color: var(--text);
      text-align: left;
    }

    .prompt-card:hover {
      background: var(--shell);
    }

    .prompt-card.selected {
      border-left-color: var(--accent);
      background: var(--shell);
    }

    .prompt-card.selection-active {
      padding-left: 54px;
    }

    .prompt-card.multi-selected {
      border-left-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 9%, var(--surface));
    }

    .prompt-card.copied {
      border-left-color: var(--kg-green);
    }

    .row-check {
      position: absolute;
      left: 24px;
      top: 19px;
      display: inline-grid;
      place-items: center;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .chip {
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 230px;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      white-space: nowrap;
    }

    .chip strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 10.5px;
      font-weight: 600;
    }

    .chip.clickable:hover {
      background: var(--surface-2);
    }

    .card-spacer { flex: 1 1 auto; }

    .bare-icon {
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      color: var(--muted);
      border-radius: 2px;
    }

    .bare-icon:hover {
      color: var(--accent-strong);
      background: color-mix(in srgb, var(--text) 5%, transparent);
    }

    .bare-icon.favorite.active {
      color: var(--kg-yellow);
    }

    .prompt-text {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }

    .prompt-card.expanded .prompt-text {
      display: block;
      -webkit-line-clamp: unset;
    }

    .show-more {
      margin-top: 8px;
      color: var(--accent-strong);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

    .artifact-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .artifact-chip {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10.5px;
    }

    .artifact-chip.broken {
      border-color: var(--kg-amber);
      background: #fff8e0;
      color: var(--kg-amber);
    }

    html[data-theme="dark"] .artifact-chip.broken {
      background: #342b13;
    }

    .artifact-plus {
      min-width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      margin-left: 4px;
      background: var(--surface-2);
      color: var(--muted);
      border-radius: 2px;
    }

    .card-foot {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      min-height: 26px;
    }

    .foot-meta {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10.5px;
    }

    .foot-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .row-actions {
      display: none;
      align-items: center;
      gap: 4px;
      margin-left: auto;
      position: relative;
    }

    .prompt-card:hover .row-actions, .prompt-card.selected .row-actions, .prompt-card.multi-selected .row-actions {
      display: flex;
    }

    .copy-button {
      height: 24px;
      width: 24px;
      display: inline-grid;
      place-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--muted);
    }

    .copy-button.copied {
      color: var(--kg-green);
    }

    .more-button {
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--muted);
    }

    .more-menu {
      position: absolute;
      right: 0;
      top: 30px;
      width: 230px;
      display: none;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      z-index: 25;
    }

    .more-menu.visible { display: block; }

    .danger { color: var(--kg-red); }

    .tag-directory {
      padding: 0 28px 32px;
    }

    .tag-directory-row {

      padding: 16px;

      border-radius: 2px;
      background: var(--shell);

      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

    .stat-value {
      margin-top: 12px;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 1;

      gap: 12px;
      padding: 0 28px 28px;

      height: 28px;
      padding: 0 10px;
      border: 1px solid color-mix(in srgb, var(--danger, #b42318) 35%, transparent);

      background: transparent;
      color: var(--danger, #b42318);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .stats-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 0 28px 14px;

      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;

      color: var(--kg-paper);

      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--shell);

      margin-bottom: 16px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

      display: grid;
      grid-template-columns: 150px 1fr;
      align-items: center;
      gap: 18px;
    }

    .pie-chart {
      width: 150px;
      height: 150px;
      transform: rotate(-90deg);
    }

    .legend {
      display: grid;
      gap: 9px;
      min-width: 0;
    }

      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 12px;

      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--kg-teal);

    .bar-chart {
      display: grid;
      gap: 9px;
    }

    .bar-row {

      align-items: center;
      gap: 10px;

      background: var(--surface);

      background: var(--kg-teal);
    }

    .bar-value {
      color: var(--text);

      font-size: 10px;
      text-align: right;

      display: grid;
      gap: 10px;
    }

    .detail-section-title {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-edit-chip {
      padding-right: 3px;
    }

    .tag-remove {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .tag-remove:hover {
      color: var(--kg-red);
      background: color-mix(in srgb, var(--kg-red) 8%, transparent);
    }

    .tag-remove .icon-svg {
      width: 13px;
      height: 13px;
    }

    .tag-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 8px;
    }

    .tag-input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
      color: var(--text);
      font: 12.5px var(--font-sans);

      height: 34px;

      place-items: center;

      border-radius: 2px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    .tag-add:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
      background: var(--accent-wash);
    }

    .toast-region {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(340px, calc(100vw - 36px));
      display: grid;
      gap: 8px;
      z-index: 80;

    .toast {

      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 2px;
      background: var(--shell);
      color: var(--text);
