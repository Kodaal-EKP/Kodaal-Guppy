      resumeBanner: document.getElementById("resume-banner"),
      sidebarToggle: document.getElementById("sidebar-toggle"),
      searchIcon: document.getElementById("search-icon"),
      search: document.getElementById("search"),
      capture: document.getElementById("capture"),
      captureLabel: document.getElementById("capture-label"),
      settings: document.getElementById("settings"),
      settingsMenu: document.getElementById("settings-menu"),
      primaryNav: document.getElementById("primary-nav"),
      projectsToggle: document.getElementById("projects-toggle"),
      projectsToolbar: document.getElementById("projects-toolbar"),
      projectsSelectAll: document.getElementById("projects-select-all"),
      projectsDeleteSelected: document.getElementById("projects-delete-selected"),
      projectsList: document.getElementById("projects-list"),
      localStats: document.getElementById("local-stats"),
      eyebrow: document.getElementById("eyebrow"),
      title: document.getElementById("page-title"),
      listCount: document.getElementById("list-count"),
      filterbar: document.getElementById("filterbar"),
      selectAll: document.getElementById("select-all"),
      bulkActions: document.getElementById("bulk-actions"),
      bulkCount: document.getElementById("bulk-count"),
      bulkCopy: document.getElementById("bulk-copy"),
      bulkFavorite: document.getElementById("bulk-favorite"),
      bulkDelete: document.getElementById("bulk-delete"),
      bulkClear: document.getElementById("bulk-clear"),
      favoriteFilter: document.getElementById("favorite-filter"),
      clearFilters: document.getElementById("clear-filters"),
      sortTrigger: document.getElementById("sort-trigger"),
      sortMenu: document.getElementById("sort-menu"),
      content: document.getElementById("content"),
      detail: document.getElementById("detail"),
      detailClose: document.getElementById("detail-close"),
      detailBody: document.getElementById("detail-body"),
      toasts: document.getElementById("toasts")
    };

    els.sidebarToggle.append(icon("chevronLeft"));
    els.searchIcon.append(icon("search"));
    els.settings.append(icon("settings"));
    els.pauseIcon.append(icon("alert"));
    els.detailClose.append(icon("x"));
    els.bulkCopy.append(icon("copy"));
    els.bulkFavorite.append(icon("star"));
    els.bulkDelete.append(icon("trash"));
    els.bulkClear.append(icon("x"));
    els.clearFilters.append(icon("x"));

    document.querySelectorAll("[data-source]").forEach(button => {
      const source = button.dataset.source;
      button.append(icon(sourceIcons[source]), document.createTextNode(sourceLabel(source)));
      button.addEventListener("click", () => {
        state.source = state.source === source ? "" : source;
        state.active = state.active === "stats" || state.active === "tags" ? "all" : state.active;
        loadPrompts();
      });
    });

    els.favoriteFilter.append(icon("star"), document.createTextNode("Favorites"));

    function applyTheme(theme) {
      state.theme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = state.theme;
      localStorage.setItem("kg_theme", state.theme);
      renderSettingsMenu();
    }

    async function api(path, options = {}) {
      const response = await fetch(path, { credentials: "same-origin", ...options });
      if (response.status === 401) throw new Error("SESSION_EXPIRED");
      if (!response.ok) throw new Error(await response.text());
      if (response.status === 204) return null;
      return response.json();
    }

    function normalizeSettings(value) {
      return {
        blocklist: {
          domains: Array.isArray(value?.blocklist?.domains) ? value.blocklist.domains : [],
          paths: Array.isArray(value?.blocklist?.paths) ? value.blocklist.paths : [],
          source_apps: Array.isArray(value?.blocklist?.source_apps) ? value.blocklist.source_apps : []
        },
        dedup_window_seconds: Number(value?.dedup_window_seconds || 60),
        refresh_interval_seconds: Number(value?.refresh_interval_seconds || 5),
        prune: {
          older_than_days: value?.prune?.older_than_days || null,
          shorter_than: value?.prune?.shorter_than || null,
          source: value?.prune?.source || null,
          dry_run: value?.prune?.dry_run !== false
        },
        suggestions: {
          enabled: value?.suggestions?.enabled === true,
          cli_enabled: value?.suggestions?.cli_enabled !== false,
          ide_enabled: value?.suggestions?.ide_enabled !== false,
          min_chars: Number(value?.suggestions?.min_chars || 24),
          limit: Number(value?.suggestions?.limit || 3)
        }
      };
    }

    function promptParams() {
      const params = new URLSearchParams();
      params.set("limit", state.active === "recent" ? "50" : "100");
      params.set("sort", state.active === "recent" ? "created_desc" : state.sort);
      if (state.query) params.set("q", state.query);
      if (state.activeProject) params.set("project_id", state.activeProject);
      if (state.activeTag) params.set("tag", state.activeTag);
      if (state.source) params.set("source", state.source);
      if (state.active === "favorites" || state.favoriteOnly) params.set("favorite", "true");
      return params;
    }

    function refreshIntervalMs() {
      const seconds = Number(state.settings.refresh_interval_seconds || 5);
      if (!Number.isFinite(seconds) || seconds < 1) return 5000;
      return Math.floor(seconds * 1000);
    }

    function stopRefreshTimer() {
      if (state.refreshTimerId !== null) {
        clearInterval(state.refreshTimerId);
        state.refreshTimerId = null;
      }
    }

    function startRefreshTimer() {
      stopRefreshTimer();
      state.refreshTimerId = window.setInterval(() => {
        refreshWorkspace().catch(renderError);
      }, refreshIntervalMs());
    }

    function rescheduleRefreshTimer() {
      startRefreshTimer();
    }

    async function refreshWorkspace() {
      if (state.refreshInFlight) return;
      state.refreshInFlight = true;
      try {
        if (state.active === "stats") {
          const stats = await api(`/api/stats?range=${encodeURIComponent(state.statsRange)}`);
          state.stats = stats;
        } else {
          const [projects, tags, prompts, stats, favorites, capture, settings] = await Promise.all([
            api("/api/projects"),
            api("/api/tags"),
            api(`/api/prompts?${promptParams()}`),
            api("/api/stats?range=all"),
            api("/api/prompts?favorite=true&limit=1"),
            api("/api/capture/status"),
            api("/api/settings")
          ]);
          state.projects = projects;
          state.tags = tags;
          state.stats = stats;
          state.summaryStats = stats;
          state.paused = Boolean(capture.paused);
          state.settings = normalizeSettings(settings);
          state.allTotal = Number(stats.total_prompts || 0);
          state.favoriteTotal = Number(favorites.total || 0);
          state.prompts = prompts.items;
          state.total = Number(prompts.total || 0);
          pruneSelection();
          if (state.selectedId && !state.prompts.some(prompt => prompt.id === state.selectedId)) {
            state.selectedId = state.prompts[0]?.id || "";
          }
        }
        renderAll();
      } finally {
        state.refreshInFlight = false;
      }
    }

    async function loadInitial() {
      renderLoading();
      try {
        const [projects, tags, stats, capture, favorites, prompts, settings] = await Promise.all([
          api("/api/projects"),
          api("/api/tags"),
          api("/api/stats?range=all"),
          api("/api/capture/status"),
          api("/api/prompts?favorite=true&limit=1"),
          api(`/api/prompts?${promptParams()}`),
          api("/api/settings")
        ]);
        state.projects = projects;
        state.tags = tags;
        state.stats = stats;
        state.summaryStats = stats;
        state.paused = Boolean(capture.paused);
        state.settings = normalizeSettings(settings);
        state.allTotal = Number(stats.total_prompts || prompts.total || 0);
        state.favoriteTotal = Number(favorites.total || 0);
        state.prompts = prompts.items;
        state.total = Number(prompts.total || 0);
        pruneSelection();
        pruneProjectSelection();
        if (!state.selectedId && state.prompts.length) state.selectedId = state.prompts[0].id;
        renderAll();
        startRefreshTimer();
      } catch (error) {
        renderError(error);
      }
    }

    async function loadPrompts() {
      if (state.active === "stats") {
        await loadStats();
        return;
      }
      renderLoading();
      try {
        const [prompts, stats, favorites, capture, settings] = await Promise.all([
          api(`/api/prompts?${promptParams()}`),
          api("/api/stats?range=all"),
          api("/api/prompts?favorite=true&limit=1"),
          api("/api/capture/status"),
          api("/api/settings")
        ]);
        state.stats = stats;
        state.summaryStats = stats;
        state.allTotal = Number(stats.total_prompts || 0);
        state.favoriteTotal = Number(favorites.total || 0);
        state.paused = Boolean(capture.paused);
        state.settings = normalizeSettings(settings);
        state.prompts = prompts.items;
        state.total = Number(prompts.total || 0);
        pruneSelection();
        if (!state.prompts.some(prompt => prompt.id === state.selectedId)) {
          state.selectedId = state.prompts[0]?.id || "";
        }
        renderAll();
      } catch (error) {
        renderError(error);
      }
    }

    async function loadStats() {
      renderLoading();
      try {
        const stats = await api(`/api/stats?range=${encodeURIComponent(state.statsRange)}`);
        state.stats = stats;
        renderAll();
      } catch (error) {
        renderError(error);
      }
    }

    function renderAll() {
      renderSidebar();
      renderCapture();
      renderSettingsMenu();
      renderPrimaryNav();
      renderProjects();
      renderLocal();
      renderHeader();
      renderFilters();
      renderContent();
      renderDetail();
    }

    function renderSidebar() {
      els.app.classList.toggle("sidebar-hidden", state.sidebarHidden);
      els.sidebarToggle.replaceChildren(icon(state.sidebarHidden ? "chevronRight" : "chevronLeft"));
      els.sidebarToggle.setAttribute("aria-label", state.sidebarHidden ? "Show sidebar" : "Hide sidebar");
      els.sidebarToggle.setAttribute("title", state.sidebarHidden ? "Show sidebar" : "Hide sidebar");
      els.sidebarToggle.setAttribute("aria-expanded", state.sidebarHidden ? "false" : "true");
    }

    function renderCapture() {
      els.pauseBanner.classList.toggle("visible", state.paused);
      els.capture.classList.toggle("paused", state.paused);
      els.captureLabel.textContent = state.paused ? "Paused" : "Capturing";
      els.capture.setAttribute("aria-label", state.paused ? "Resume capture" : "Pause capture");
    }

    function renderSettingsMenu() {
      els.settingsMenu.replaceChildren(
        menuInfo("Settings", "Theme"),
        menuButton("Light mode", () => applyTheme("light"), state.theme === "light"),
        menuButton("Dark mode", () => applyTheme("dark"), state.theme === "dark"),
        menuInfo("Capture", state.paused ? "Paused" : "Active"),
        menuButton(state.paused ? "Resume capture" : "Pause capture", () => toggleCaptureFromSettings().catch(renderError), false, state.paused ? "play" : "pause"),
        menuButton("Blocklist", () => editBlocklistSettings().catch(renderError), false, "filter"),
        menuButton("Dedup window", () => editDedupSettings().catch(renderError), false, "clock"),
        menuButton(`Refresh every ${state.settings.refresh_interval_seconds || 5}s`, () => editRefreshSettings().catch(renderError), false, "clock"),
        menuButton(state.settings.suggestions.enabled ? "Disable suggestions" : "Enable suggestions", () => toggleSuggestionSettings().catch(renderError), false, "search"),
        menuButton("Prune defaults", () => editPruneSettings().catch(renderError), false, "trash"),
        menuInfo("Archive", "JSON"),
        menuButton("Export archive", () => {
          window.location.href = "/api/export?format=json";
          state.settingsOpen = false;
          syncMenus();
        }, false)
      );
      syncMenus();
    }

    function renderPrimaryNav() {
      const sections = [
        ["all", "All Prompts", "database", state.allTotal],
        ["favorites", "Favorites", "heart", state.favoriteTotal],
        ["recent", "Recent", "clock", Math.min(state.allTotal, 50)],
        ["tags", "Tags", "hash", state.tags.length],
        ["stats", "Stats", "bar", null]
      ];
      els.primaryNav.replaceChildren(...sections.map(([id, label, iconName, count]) => {
        const active = state.active === id && !state.activeProject && !state.activeTag;
        const node = buttonEl("nav-item", () => {
          state.active = id;
          state.activeProject = "";
          state.activeTag = "";
          state.favoriteOnly = false;
          state.source = "";
          state.sortOpen = false;
          state.openProjectMenuId = "";
          if (id === "stats") loadStats();
          else if (id === "tags") renderAll();
          else loadPrompts();
        });
        node.classList.toggle("active", active);
        node.append(icon(iconName), textEl("span", label, "nav-label"));
        if (count !== null) node.append(textEl("span", formatNumber(count), "count"));
        return node;
      }));
    }

    function projectIds() {
      return state.projects.map(project => project.id);
    }

    function pruneProjectSelection() {
      const visible = new Set(projectIds());
      state.selectedProjectIds = new Set([...state.selectedProjectIds].filter(id => visible.has(id)));
    }

    function renderProjectSelectionState() {
      const ids = projectIds();
      const selected = ids.filter(id => state.selectedProjectIds.has(id)).length;
      const showToolbar = state.projectsOpen && ids.length > 0;
      els.projectsToolbar.classList.toggle("hidden", !showToolbar);
      if (!showToolbar) return;
      els.projectsSelectAll.checked = ids.length > 0 && selected === ids.length;
      els.projectsSelectAll.indeterminate = selected > 0 && selected < ids.length;
      els.projectsDeleteSelected.disabled = selected === 0;
      els.projectsDeleteSelected.textContent = selected > 1 ? `Delete (${selected})` : "Delete";
    }

    function toggleProjectSelected(id, checked) {
      if (checked) state.selectedProjectIds.add(id);
      else state.selectedProjectIds.delete(id);
      renderProjects();
    }

    function toggleSelectAllProjects(checked) {
      if (checked) projectIds().forEach(id => state.selectedProjectIds.add(id));
      else state.selectedProjectIds.clear();
      renderProjects();
    }

    function renderProjects() {
      els.projectsToggle.replaceChildren(
        icon(state.projectsOpen ? "chevronDown" : "chevronRight"),
        textEl("span", "Projects", "section-title"),
        textEl("span", String(state.projects.length), "badge")
      );
      els.projectsToggle.setAttribute("aria-expanded", state.projectsOpen ? "true" : "false");
      if (!state.projectsOpen) {
        els.projectsList.replaceChildren();
        renderProjectSelectionState();
        return;
      }
      els.projectsList.replaceChildren(...state.projects.map(project => {
        const row = el("div", "project-nav-row");
        row.classList.toggle("selected", state.selectedProjectIds.has(project.id));
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "project-checkbox";
        checkbox.checked = state.selectedProjectIds.has(project.id);
        checkbox.setAttribute("aria-label", `Select project ${project.name}`);
        checkbox.addEventListener("click", event => event.stopPropagation());
        checkbox.addEventListener("change", () => toggleProjectSelected(project.id, checkbox.checked));
        const node = buttonEl("nav-item", () => {
          state.activeProject = project.id;
          state.activeTag = "";
          state.active = "all";
          state.sortOpen = false;
          state.openProjectMenuId = "";
          loadPrompts();
        });
        node.classList.toggle("active", state.activeProject === project.id);
        const dot = el("span", "project-dot");
        dot.style.background = project.color || "#1f8a8a";
        node.append(dot, textEl("span", project.name, "nav-label"), textEl("span", formatNumber(project.prompt_count), "count"));
        const actions = el("span", "project-actions");
        const more = buttonEl(`project-more ${state.openProjectMenuId === project.id ? "active" : ""}`.trim(), event => {
          event.stopPropagation();
          state.openProjectMenuId = state.openProjectMenuId === project.id ? "" : project.id;
          renderProjects();
        });
        more.setAttribute("aria-label", `Project actions for ${project.name}`);
        more.setAttribute("title", `Project actions for ${project.name}`);
        more.setAttribute("aria-haspopup", "menu");
        more.setAttribute("aria-expanded", state.openProjectMenuId === project.id ? "true" : "false");
        more.append(icon("more"));
        actions.append(more, projectMenu(project));
        row.append(checkbox, node, actions);
        return row;
      }));
      renderProjectSelectionState();
    }

    function projectMenu(project) {
      const menu = el("div", `more-menu ${state.openProjectMenuId === project.id ? "visible" : ""}`.trim());
      menu.setAttribute("role", "menu");
      menu.addEventListener("click", event => event.stopPropagation());
      menu.append(menuButton("Delete", () => deleteProject(project), false, "trash", "danger"));
      return menu;
    }

    function renderTagDirectory() {
      if (!state.tags.length) {
        const empty = el("div", "empty");
        empty.append(icon("hash"), textEl("div", "No tags yet.", "empty-title"));
        els.content.replaceChildren(empty);
        els.detail.classList.add("hidden");
        return;
      }
      const wrap = el("div", "tag-directory");
      state.tags.forEach(tag => {
        const node = buttonEl("tag-directory-row", () => {
          state.activeTag = tag.name;
          state.activeProject = "";
          state.active = "all";
          state.sortOpen = false;
          loadPrompts();
        });
        node.append(icon("hash"), textEl("span", tag.name, "nav-label"), textEl("span", formatNumber(tag.count), "count"));
        wrap.append(node);
      });
      els.content.replaceChildren(wrap);
      els.detail.classList.add("hidden");
    }

    function renderLocal() {
      const rows = [
        ["Prompts", formatNumber(state.summaryStats.total_prompts || state.allTotal)],
        ["Projects", formatNumber(state.summaryStats.total_projects || state.projects.length)],
        ["Artifacts", formatNumber(state.summaryStats.total_artifacts || 0)]
      ];
      els.localStats.replaceChildren(...rows.map(([label, value]) => {
        const row = el("div", "kv-row");
        row.append(textEl("span", label), textEl("strong", value));
        return row;
      }));
    }

    function renderHeader() {
      const label = currentLabel();
      els.eyebrow.textContent = label.eyebrow;
      els.title.textContent = label.title;
      if (state.active === "stats") {
        els.listCount.replaceChildren(textEl("strong", formatNumber(state.stats.total_prompts || 0)), document.createTextNode(" prompts"));
      } else if (state.active === "tags") {
        els.listCount.replaceChildren(textEl("strong", formatNumber(state.tags.length)), document.createTextNode(" tags"));
      } else {
        els.listCount.replaceChildren(textEl("strong", formatNumber(state.total)), document.createTextNode(` of ${formatNumber(state.allTotal)}`));
      }
    }

    function renderFilters() {
      els.filterbar.classList.toggle("hidden", state.active === "stats" || state.active === "tags");
      document.querySelectorAll("[data-source]").forEach(button => {
        button.classList.toggle("active", state.source === button.dataset.source);
      });
      els.favoriteFilter.classList.toggle("active", state.favoriteOnly || state.active === "favorites");
      els.clearFilters.classList.toggle("hidden", !hasFilters());
      els.sortTrigger.replaceChildren(document.createTextNode(sortLabels[state.sort]), icon("chevronDown"));
      els.sortTrigger.setAttribute("aria-expanded", state.sortOpen ? "true" : "false");
      els.sortMenu.replaceChildren(...Object.entries(sortLabels).map(([value, label]) => {
        return menuButton(label, () => {
          state.sort = value;
          state.sortOpen = false;
          loadPrompts();
        }, state.sort === value);
      }));
      renderSelectionState();
      syncMenus();
    }

    function renderContent() {
      if (state.active === "stats") {
        renderStats();
        return;
      }
      if (state.active === "tags") {
        renderTagDirectory();
        return;
      }
      if (!state.prompts.length) {
        renderEmpty();
        return;
      }
      els.content.replaceChildren(...state.prompts.map(renderPromptCard));
    }

    function renderStats() {
      const toolbar = el("div", "stats-toolbar");
      [
        ["day", "Day"],
        ["week", "Week"],
        ["month", "Month"],
        ["year", "Year"]
      ].forEach(([range, label]) => {
        const node = buttonEl(`range-button ${state.statsRange === range ? "active" : ""}`.trim(), () => {
          state.statsRange = range;
          loadStats();
        });
        node.textContent = label;
        toolbar.append(node);
      });
      const resetBtn = buttonEl("stats-reset", () => resetStatistics().catch(renderError));
      resetBtn.textContent = "Reset statistics";
      resetBtn.setAttribute("aria-label", "Reset copy and delete statistics");
      toolbar.append(resetBtn);

      const metrics = el("div", "stats-grid");
      const platform = state.stats.most_used_platform || {};
      const platformLabel = platform.source_app ? sourceAppLabel(platform.source_app) : "No data";
      metrics.append(
        statCard("Total prompts", formatNumber(state.stats.total_prompts || 0), "database"),
        statCard("Avg prompts/day", formatDecimal(state.stats.average_prompts_per_day || 0), "bar"),
        statCard("Most used platform", `${platformLabel} ${formatNumber(platform.count || 0)}`, "filter"),
        statCard("Copied", formatNumber(state.stats.total_copied || 0), "copy"),
        statCard("Deleted", formatNumber(state.stats.total_deleted || 0), "trash"),
        statCard("Avg est. tokens", formatDecimal(state.stats.average_estimated_tokens_per_prompt || 0), "code")
      );

      const charts = el("div", "stats-charts");
      charts.append(
        chartPanel("Overall prompts over time", lineChart(state.stats.overall_time_series || [], "count", "Prompts")),
        chartPanel("Prompts over time by platform", multiLineChart(state.stats.platform_time_series || [], "source", sourceLabel)),
        chartPanel("Prompts over time by provider", multiLineChart(state.stats.provider_time_series || [], "source_app", sourceAppLabel)),
        chartPanel("Platform share", pieChart((state.stats.by_source_app || []).slice(0, 7))),
        chartPanel("Project use", barChart(state.stats.top_projects || [], "name", "prompt_count", 10)),
        chartPanel("Source mix", barChart(sourceMapRows(state.stats.by_source || {}), "label", "count", 4))
      );
      els.content.replaceChildren(toolbar, metrics, charts);
      els.detail.classList.add("hidden");
    }

    function chartPanel(title, body) {
      const panel = el("section", "chart-panel");
      panel.append(textEl("div", title, "chart-title"), body);
      return panel;
    }

    function pieChart(rows) {
      const total = rows.reduce((sum, row) => sum + Number(row.count || 0), 0);
      const wrap = el("div", "pie-wrap");
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 42 42");
      svg.classList.add("pie-chart");
      const bg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      bg.setAttribute("cx", "21");
      bg.setAttribute("cy", "21");
      bg.setAttribute("r", "15.9");
      bg.setAttribute("fill", "transparent");
      bg.setAttribute("stroke", "var(--surface)");
      bg.setAttribute("stroke-width", "6");
      svg.append(bg);
      let offset = 0;
      const legend = el("div", "legend");
      rows.forEach((row, index) => {
        const count = Number(row.count || 0);
        const percent = total > 0 ? (count / total) * 100 : 0;
        const color = chartColor(index);
        if (percent > 0) {
          const segment = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          segment.setAttribute("cx", "21");
          segment.setAttribute("cy", "21");
          segment.setAttribute("r", "15.9");
          segment.setAttribute("fill", "transparent");
          segment.setAttribute("stroke", color);
          segment.setAttribute("stroke-width", "6");
          segment.setAttribute("stroke-dasharray", `${percent} ${100 - percent}`);
          segment.setAttribute("stroke-dashoffset", `${-offset}`);
          svg.append(segment);
          offset += percent;
        }
        legend.append(legendRow(sourceAppLabel(row.source_app || row.source || "Unknown"), count, color));
      });
      if (!rows.length) {
        legend.append(textEl("div", "No platform data", "muted"));
      }
      wrap.append(svg, legend);
      return wrap;
    }

    function legendRow(label, count, color) {
      const row = el("div", "legend-row");
      const swatch = el("span", "legend-swatch");
      swatch.style.background = color;
      row.append(swatch, textEl("span", label), textEl("span", formatNumber(count), "bar-value"));
      return row;
    }

    function barChart(rows, labelKey, valueKey, limit) {
      const chart = el("div", "bar-chart");
      const visible = rows.slice(0, limit);
      const max = Math.max(1, ...visible.map(row => Number(row[valueKey] || 0)));
      visible.forEach((row, index) => {
        const value = Number(row[valueKey] || 0);
        const line = el("div", "bar-row");
        const track = el("div", "bar-track");
        const fill = el("div", "bar-fill");
        fill.style.width = `${Math.max(2, (value / max) * 100)}%`;
        fill.style.background = chartColor(index);
        track.append(fill);
        line.append(textEl("span", String(row[labelKey] || "Unknown"), "bar-label"), track, textEl("span", formatNumber(value), "bar-value"));
        chart.append(line);
      });
      if (!visible.length) {
        chart.append(textEl("div", "No data", "muted"));
      }
      return chart;
    }

    function lineChart(rows, valueKey, label) {
      return multiLineChart(rows.map(row => ({ ...row, series: label })), "series", value => value, valueKey);
    }

    function multiLineChart(rows, seriesKey, labelFn, valueKey = "count") {
      const wrap = el("div", "legend");
      if (!rows.length) {
        wrap.append(textEl("div", "No data", "muted"));
        return wrap;
      }
      const labels = [...new Set(rows.map(row => row.bucket))];
      const series = [...new Set(rows.map(row => row[seriesKey]))].slice(0, 8);
      const max = Math.max(1, ...rows.map(row => Number(row[valueKey] || 0)));
      const frame = { left: 50, right: 620, top: 22, bottom: 184 };
      frame.width = frame.right - frame.left;
      frame.height = frame.bottom - frame.top;
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 640 232");
      svg.classList.add("line-chart");
      const yTicks = [...new Set([0, Math.ceil(max / 2), max])];
      yTicks.forEach(value => {
        const y = frame.bottom - (value / max) * frame.height;
        const grid = document.createElementNS("http://www.w3.org/2000/svg", "path");
        grid.setAttribute("d", `M${frame.left} ${y.toFixed(1)}H${frame.right}`);
        grid.setAttribute("class", "line-grid");
        svg.append(grid);
        svg.append(svgText(formatNumber(value), frame.left - 8, y, "line-axis-label y"));
      });
      const xTickIndexes = [...new Set(labels.length <= 2 ? labels.map((_, index) => index) : [0, Math.floor((labels.length - 1) / 2), labels.length - 1])];
      xTickIndexes.forEach(index => {
        const x = labels.length <= 1 ? frame.left : frame.left + (index / (labels.length - 1)) * frame.width;
        const tick = document.createElementNS("http://www.w3.org/2000/svg", "path");
        tick.setAttribute("d", `M${x.toFixed(1)} ${frame.bottom}V${frame.bottom + 5}`);
        tick.setAttribute("class", "line-axis");
        svg.append(tick);
        svg.append(svgText(formatChartBucket(labels[index]), x, 208, "line-axis-label x"));
      });
      const axisX = document.createElementNS("http://www.w3.org/2000/svg", "path");
      axisX.setAttribute("d", `M${frame.left} ${frame.bottom}H${frame.right}`);
      axisX.setAttribute("class", "line-axis");
      svg.append(axisX);
      const axisY = document.createElementNS("http://www.w3.org/2000/svg", "path");
      axisY.setAttribute("d", `M${frame.left} ${frame.top}V${frame.bottom}`);
      axisY.setAttribute("class", "line-axis");
      svg.append(axisY);
      series.forEach((name, index) => {
        const color = chartColor(index);
        const points = labels.map((bucket, bucketIndex) => {
          const row = rows.find(item => item.bucket === bucket && item[seriesKey] === name);
          const value = Number(row?.[valueKey] || 0);
          const x = labels.length <= 1 ? frame.left : frame.left + (bucketIndex / (labels.length - 1)) * frame.width;
          const y = frame.bottom - (value / max) * frame.height;
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ");
        const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        line.setAttribute("points", points);
        line.setAttribute("stroke", color);
        line.setAttribute("class", "line-series");
        svg.append(line);
      });
      const legend = el("div", "legend");
      series.forEach((name, index) => {
        legend.append(legendRow(labelFn(name), rows.filter(row => row[seriesKey] === name).reduce((sum, row) => sum + Number(row[valueKey] || 0), 0), chartColor(index)));
      });
      wrap.append(svg, legend);
      return wrap;
    }

    function svgText(value, x, y, className) {
      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("x", x.toFixed(1));
      text.setAttribute("y", y.toFixed(1));
      text.setAttribute("class", className);
      text.textContent = value;
      return text;
    }

    function formatChartBucket(bucket) {
      if (typeof bucket !== "string") return "";
      if (bucket.includes("T")) return bucket.slice(11, 16);
      if (/^\d{4}-\d{2}-\d{2}$/.test(bucket)) return bucket.slice(5);
      return bucket;
    }

    function sourceMapRows(map) {
      return Object.entries(map).map(([source, count]) => ({ label: sourceLabel(source), count }));
    }

    function chartColor(index) {
      return ["#008b8b", "#c69214", "#4b8b5b", "#7d5a9a", "#a64545", "#1f2426", "#7c8789"][index % 7];
    }

    function renderPromptCard(prompt) {
      const selected = state.selectedId === prompt.id;
      const multiSelected = state.selectedIds.has(prompt.id);
      const selectionVisible = state.selectionMode || state.selectedIds.size > 0;
      const expanded = state.expandedIds.has(prompt.id);
      const copied = state.copiedId === prompt.id;
      const card = el("article", `prompt-card ${selected ? "selected" : ""} ${selectionVisible ? "selection-active" : ""} ${multiSelected ? "multi-selected" : ""} ${expanded ? "expanded" : ""} ${copied ? "copied" : ""}`.trim());
      card.dataset.promptId = prompt.id;
      card.tabIndex = 0;
      card.addEventListener("click", () => {
        state.selectedId = prompt.id;
        state.openPromptMenuId = "";
        renderContent();
        renderDetail();
      });
      card.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          state.selectedId = prompt.id;
          renderContent();
          renderDetail();
        }
      });
      card.setAttribute("role", "article");
      card.setAttribute("aria-label", `Prompt from ${prompt.source_app}`);

      if (selectionVisible) {
        const rowCheck = el("label", "row-check");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "prompt-checkbox";
        checkbox.checked = multiSelected;
        checkbox.setAttribute("aria-label", `Select prompt from ${prompt.source_app}`);
        checkbox.addEventListener("click", event => event.stopPropagation());
        checkbox.addEventListener("change", event => {
          event.stopPropagation();
          togglePromptSelected(prompt.id, checkbox.checked);
        });
        rowCheck.addEventListener("click", event => event.stopPropagation());
        rowCheck.append(checkbox);
        card.append(rowCheck);
      }

      const head = el("div", "card-head");
      const project = buttonEl("chip clickable", event => {
        event.stopPropagation();
        if (prompt.project_id) {
          state.activeProject = prompt.project_id;
          state.activeTag = "";
          state.active = "all";
          loadPrompts();
        }
      });
      const dot = el("span", "project-dot");
      dot.style.background = projectColor(prompt);
      project.append(dot, textEl("strong", prompt.project_name || "No project"));
      head.append(project, sourceChip(prompt));
      prompt.tags.slice(0, 3).forEach(tag => {
        const tagButton = buttonEl("chip clickable", event => {
          event.stopPropagation();
          state.activeTag = tag;
          state.activeProject = "";
          state.active = "all";
          loadPrompts();
        });
        tagButton.append(textEl("span", `#${tag}`));
        head.append(tagButton);
      });
      head.append(el("span", "card-spacer"));
      const favorite = iconOnly("star", prompt.favorite ? "Remove favorite" : "Favorite");
      favorite.classList.add("favorite");
      favorite.classList.toggle("active", prompt.favorite);
      favorite.addEventListener("click", event => {
        event.stopPropagation();
        toggleFavorite(prompt.id, !prompt.favorite);
      });
      head.append(favorite);

      const text = textEl("p", prompt.text, "prompt-text");
      text.addEventListener("click", event => {
        event.stopPropagation();
        toggleExpanded(prompt.id);
      });

      card.append(head, text);
      if (prompt.text.length > 220) {
        const more = buttonEl("show-more", event => {
          event.stopPropagation();
          toggleExpanded(prompt.id);
        });
        more.textContent = expanded ? "Show less" : "Show more";
        card.append(more);
      }
      if (prompt.artifacts.length) card.append(artifactRow(prompt.artifacts, prompt.project_id));
      card.append(cardFooter(prompt));
      return card;
    }

    function sourceChip(prompt) {
      const chipNode = el("span", "chip");
      chipNode.append(icon(sourceIcons[prompt.source] || "database"), textEl("span", `${prompt.source}/${prompt.source_app}`));
      return chipNode;
    }

    function artifactRow(artifacts, currentProjectId) {
      const row = el("div", "artifact-row");
      artifacts.forEach(artifact => {
        const node = el("span", `artifact-chip ${artifact.is_broken ? "broken" : ""}`.trim());
        node.append(icon(artifact.is_broken ? "alert" : "paperclip"), textEl("span", artifact.filename));
        if (!artifact.project_id || !currentProjectId || artifact.project_id !== currentProjectId) {
          node.append(textEl("span", "+", "artifact-plus"));
        }
        row.append(node);
      });
      return row;
    }

    function cardFooter(prompt) {
      const footer = el("div", "card-foot");
      const meta = el("span", "foot-meta");
      meta.append(
        document.createTextNode("Used "),
        textEl("strong", `${prompt.use_count}x`),
        document.createTextNode(`  /  ${relativeTime(prompt.last_used_at || prompt.created_at)}`)
      );
      if (prompt.conversation_title) meta.append(document.createTextNode(`  /  "${prompt.conversation_title}"`));
      footer.append(meta);

      const actions = el("span", "row-actions");
      const copy = buttonEl(`copy-button ${state.copiedId === prompt.id ? "copied" : ""}`.trim(), event => {
        event.stopPropagation();
        copyPrompt(prompt.id);
      });
      copy.setAttribute("aria-label", state.copiedId === prompt.id ? "Copied" : "Copy prompt");
      copy.title = state.copiedId === prompt.id ? "Copied" : "Copy prompt";
      copy.append(icon("copy"));
      const moreWrap = el("span");
      moreWrap.style.position = "relative";
      const more = iconOnly("more", "More actions");
      more.className = "more-button";
      more.addEventListener("click", event => {
        event.stopPropagation();
        state.openPromptMenuId = state.openPromptMenuId === prompt.id ? "" : prompt.id;
        state.openProjectMenuId = "";
        renderContent();
      });
      const menu = promptMenu(prompt);
      moreWrap.append(more, menu);
      actions.append(copy, moreWrap);
      footer.append(actions);
      return footer;
    }

    function promptMenu(prompt) {
      const menu = el("div", `more-menu ${state.openPromptMenuId === prompt.id ? "visible" : ""}`.trim());
      menu.setAttribute("role", "menu");
      menu.addEventListener("click", event => event.stopPropagation());
      menu.append(
        menuInfo("Created", formatDate(prompt.created_at)),
        menuInfo("Source", `${prompt.source}/${prompt.source_app}`),
        menuButton("Copy", () => copyPrompt(prompt.id), false, "copy"),
        menuButton(prompt.favorite ? "Remove favorite" : "Favorite", () => toggleFavorite(prompt.id, !prompt.favorite), false, "star"),
        menuButton("Delete", () => deletePrompt(prompt.id), false, "trash", "danger")
      );
      return menu;
    }

    function renderDetail() {
      if (state.active === "stats" || state.active === "tags") return;
      const prompt = state.prompts.find(item => item.id === state.selectedId);
      if (!prompt) {
        els.detail.classList.add("hidden");
        els.detailBody.replaceChildren();
        return;
      }
      els.detail.classList.remove("hidden");
      const body = els.detailBody;
      body.replaceChildren();
      const chips = el("div", "card-head");
      const project = el("span", "chip");
      const dot = el("span", "project-dot");
      dot.style.background = projectColor(prompt);
      project.append(dot, textEl("strong", prompt.project_name || "No project"));
      chips.append(project, sourceChip(prompt));
      prompt.tags.forEach(tag => {
        const tagButton = buttonEl("chip clickable", event => {
          event.stopPropagation();
          state.activeTag = tag;
          state.activeProject = "";
          state.active = "all";
          loadPrompts();
        });
        tagButton.append(textEl("span", `#${tag}`));
        chips.append(tagButton);
      });

      const fullText = textEl("div", prompt.text, "detail-text");
      const tagManager = renderTagManager(prompt);
      const metadata = el("div");
      metadata.append(
        detailRow("Created", formatDate(prompt.created_at)),
        detailRow("Last used", `${formatDate(prompt.last_used_at)} (${prompt.use_count} times)`),
        detailRow("Conversation", prompt.conversation_title || "None"),
        detailRow("Source URL", metadataUrl(prompt) || "None")
      );
      body.append(chips, fullText, tagManager, metadata);
      if (prompt.artifacts.length) {
        const artifactsTitle = textEl("div", `Artifacts (${prompt.artifacts.length})`, "eyebrow");
        const artifacts = el("div");
        prompt.artifacts.forEach(artifact => artifacts.append(artifactRow([artifact], prompt.project_id)));
        body.append(artifactsTitle, artifacts);
      }
      const actions = el("div");
      actions.style.display = "grid";
      actions.style.gridTemplateColumns = "1fr 1fr";
      actions.style.gap = "8px";
      actions.style.marginTop = "22px";
      const copy = buttonEl("solid-button", () => copyPrompt(prompt.id));
      copy.append(icon("copy"), document.createTextNode("Copy"));
      const open = buttonEl("filter-button", () => {
        const url = metadataUrl(prompt);
        if (url) window.open(url, "_blank", "noopener,noreferrer");
      });
      open.disabled = !metadataUrl(prompt);
      open.append(icon("external"), document.createTextNode("Open"));
      actions.append(copy, open);
      body.append(actions);
    }

    function renderTagManager(prompt) {
      const section = el("section", "detail-section tag-manager");
      section.append(textEl("div", "Tags", "detail-section-title"));
      const list = el("div", "tag-list");
      if (prompt.tags.length) {
        prompt.tags.forEach(tag => {
          const chip = el("span", "chip tag-edit-chip");
          chip.append(icon("hash"), textEl("span", tag));
          const remove = buttonEl("tag-remove", event => {
            event.stopPropagation();
            removePromptTag(prompt.id, tag).catch(renderError);
          });
          remove.setAttribute("aria-label", `Remove tag ${tag}`);
          remove.title = `Remove tag ${tag}`;
          remove.append(icon("x"));
          chip.append(remove);
          list.append(chip);
        });
      } else {
        list.append(textEl("span", "No tags yet", "muted"));
      }
      const form = el("form", "tag-form");
      const input = el("input", "tag-input");
      input.type = "text";
      input.name = "tag";
      input.autocomplete = "off";
      input.setAttribute("aria-label", "Add tag to prompt");
      const submit = el("button", "tag-add");
      submit.type = "submit";
      submit.setAttribute("aria-label", "Add tag");
      submit.title = "Add tag";
      submit.append(icon("plus"));
      form.append(input, submit);
      form.addEventListener("submit", event => {
        event.preventDefault();
        const name = normalizeTagInput(input.value);
        if (!name) return;
        input.value = "";
        addPromptTag(prompt.id, name).catch(renderError);
      });
      section.append(list, form);
      return section;
    }

    function renderEmpty() {
      const empty = el("div", "empty");
      empty.append(icon("database"), textEl("div", state.query || hasFilters() ? "No prompts match these filters." : "No prompts yet.", "empty-title"));
      if (state.query || hasFilters()) {
        const clear = buttonEl("solid-button", () => {
          clearFilters();
          loadPrompts();
        });
        clear.textContent = "Clear filters";
        empty.append(clear);
      }
      els.content.replaceChildren(empty);
      renderDetail();
    }

    function renderLoading() {
      const loading = el("div", "empty");
      loading.append(icon("database"), textEl("div", "Loading prompts", "empty-title"));
      els.content.replaceChildren(loading);
    }

    function renderError(error) {
      const message = error.message === "SESSION_EXPIRED" ? "Session expired. Reload the page." : "Could not load prompts.";
      const node = el("div", "empty");
      node.append(icon("alert"), textEl("div", message, "empty-title"));
      els.content.replaceChildren(node);
    }

    function statCard(label, value, iconName) {
      const card = el("div", "stat-card");
      card.append(icon(iconName), textEl("div", label, "stat-label"), textEl("div", String(value), "stat-value"));
      return card;
    }

    function currentLabel() {
      if (state.active === "stats") return { eyebrow: "Stats", title: "Stats" };
      if (state.active === "tags") return { eyebrow: "Tags", title: "Tags" };
      if (state.activeProject) {
        const project = state.projects.find(item => item.id === state.activeProject);
        return { eyebrow: "Project", title: project?.name || "Project" };
      }
      if (state.activeTag) return { eyebrow: "Tag", title: `#${state.activeTag}` };
      if (state.active === "favorites") return { eyebrow: "Favorites", title: "Favorites" };
      if (state.active === "recent") return { eyebrow: "Recent", title: "Recent prompts" };
      return { eyebrow: "All Prompts", title: "All prompts" };
    }

    function clearFilters() {
      state.active = "all";
      state.activeProject = "";
      state.activeTag = "";
      state.source = "";
      state.favoriteOnly = false;
      state.sort = "created_desc";
      state.query = "";
      els.search.value = "";
      state.selectedIds.clear();
      state.selectionMode = false;
    }

    function hasFilters() {
      return Boolean(state.activeProject || state.activeTag || state.source || state.favoriteOnly || state.active === "favorites" || state.active === "recent" || state.active === "tags" || state.sort !== "created_desc" || state.query);
    }

    function selectedPrompt() {
      return state.prompts.find(prompt => prompt.id === state.selectedId) || state.prompts[0] || null;
    }

    function selectPromptByDelta(delta) {
      if (!state.prompts.length || state.active === "stats" || state.active === "tags") return;
      const currentIndex = Math.max(0, state.prompts.findIndex(prompt => prompt.id === state.selectedId));
      const nextIndex = Math.min(state.prompts.length - 1, Math.max(0, currentIndex + delta));
      state.selectedId = state.prompts[nextIndex].id;
      renderContent();
      renderDetail();
      document.querySelector(`[data-prompt-id="${state.selectedId}"]`)?.focus({ preventScroll: true });
      document.querySelector(`[data-prompt-id="${state.selectedId}"]`)?.scrollIntoView({ block: "nearest" });
    }

    function toggleSelectedFavorite() {
      const prompt = selectedPrompt();
      if (!prompt) return;
      toggleFavorite(prompt.id, !prompt.favorite).catch(renderError);
    }

    function deleteSelectedPromptFromKeyboard() {
      const prompt = selectedPrompt();
      if (!prompt) return;
      deletePrompt(prompt.id).catch(renderError);
    }

    function visiblePromptIds() {
      return state.prompts.map(prompt => prompt.id);
    }

    function pruneSelection() {
      const visible = new Set(visiblePromptIds());
      state.selectedIds = new Set([...state.selectedIds].filter(id => visible.has(id)));
      if (!state.selectedIds.size) state.selectionMode = false;
    }

    function renderSelectionState() {
      if (state.active === "stats" || state.active === "tags") {
        state.selectedIds.clear();
        state.selectionMode = false;
      }
      const visibleIds = visiblePromptIds();
      const selectedVisible = visibleIds.filter(id => state.selectedIds.has(id)).length;
      els.selectAll.checked = visibleIds.length > 0 && selectedVisible === visibleIds.length;
      els.selectAll.indeterminate = selectedVisible > 0 && selectedVisible < visibleIds.length;
      els.selectAll.disabled = visibleIds.length === 0 || state.active === "stats" || state.active === "tags";
      els.bulkActions.classList.toggle("hidden", selectedVisible === 0);
      els.bulkCount.textContent = `${selectedVisible} selected`;
      els.bulkCopy.disabled = selectedVisible === 0;
      els.bulkFavorite.disabled = selectedVisible === 0;
      els.bulkDelete.disabled = selectedVisible === 0;
    }

    function toggleSelectAllVisible(checked) {
      state.selectionMode = checked || state.selectedIds.size > 0;
      if (checked) visiblePromptIds().forEach(id => state.selectedIds.add(id));
      else visiblePromptIds().forEach(id => state.selectedIds.delete(id));
      if (!state.selectedIds.size) state.selectionMode = false;
      renderContent();
      renderSelectionState();
    }

    function togglePromptSelected(id, selected) {
      if (selected) {
        state.selectedIds.add(id);
        state.selectionMode = true;
      } else {
        state.selectedIds.delete(id);
        if (!state.selectedIds.size) state.selectionMode = false;
      }
      renderContent();
      renderSelectionState();
    }

    function clearSelection() {
      state.selectedIds.clear();
      state.selectionMode = false;
      renderContent();
      renderSelectionState();
    }

    function syncMenus() {
      els.settings.classList.toggle("active", state.settingsOpen);
      els.settings.setAttribute("aria-expanded", state.settingsOpen ? "true" : "false");
      els.settingsMenu.classList.toggle("visible", state.settingsOpen);
      els.sortTrigger.setAttribute("aria-expanded", state.sortOpen ? "true" : "false");
      els.sortMenu.classList.toggle("visible", state.sortOpen);
    }

    function toggleExpanded(id) {
      if (state.expandedIds.has(id)) state.expandedIds.delete(id);
      else state.expandedIds.add(id);
      renderContent();
    }

    async function copyPrompt(id) {
      const prompt = await api(`/api/prompts/${id}`);
      await navigator.clipboard.writeText(prompt.text);
      await api(`/api/prompts/${id}/reuse`, { method: "POST" });
      state.copiedId = id;
      state.openPromptMenuId = "";
      toast("Copied");
      await loadPrompts();
      setTimeout(() => {
        if (state.copiedId === id) {
          state.copiedId = "";
          renderContent();
        }
      }, 900);
    }

    async function copySelectedPrompts() {
      const selected = state.prompts.filter(prompt => state.selectedIds.has(prompt.id));
      if (!selected.length) return;
      await navigator.clipboard.writeText(selected.map(prompt => prompt.text).join("\n\n---\n\n"));
      await Promise.all(selected.map(prompt => api(`/api/prompts/${prompt.id}/reuse`, { method: "POST" })));
      toast(`Copied ${selected.length} prompts`);
      clearSelection();
      await loadPrompts();
    }

    async function toggleFavorite(id, favorite) {
      await api(`/api/prompts/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ favorite })
      });
      state.openPromptMenuId = "";
      toast(favorite ? "Added to favorites" : "Removed from favorites");
      await loadPrompts();
    }

    async function favoriteSelectedPrompts() {
      const selected = visiblePromptIds().filter(id => state.selectedIds.has(id));
      if (!selected.length) return;
      await Promise.all(selected.map(id => api(`/api/prompts/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ favorite: true })
      })));
      toast(`Favorited ${selected.length} prompts`);
      clearSelection();
      await loadPrompts();
    }

    async function addPromptTag(promptId, name) {
      await api(`/api/prompts/${promptId}/tags`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      });
      state.tags = await api("/api/tags");
      toast(`Added #${name}`);
      await loadPrompts();
    }

    async function removePromptTag(promptId, tagName) {
      let tag = findTagByName(tagName);
      if (!tag) {
        state.tags = await api("/api/tags");
        tag = findTagByName(tagName);
      }
      if (!tag) throw new Error(`Tag not found: ${tagName}`);
      await api(`/api/prompts/${promptId}/tags/${encodeURIComponent(tag.id)}`, { method: "DELETE" });
      state.tags = await api("/api/tags");
      toast(`Removed #${tagName}`);
      await loadPrompts();
    }

    async function editRefreshSettings() {
      const value = prompt(
        "UI refresh interval in seconds",
        String(state.settings.refresh_interval_seconds || 5)
      );
      if (value === null) return;
      const seconds = Number(value);
      if (!Number.isInteger(seconds) || seconds < 1 || seconds > 3600) {
        toast("Refresh interval must be 1-3600 seconds");
        return;
      }
      await saveSettings({ refresh_interval_seconds: seconds });
      rescheduleRefreshTimer();
      toast(`Refresh interval set to ${seconds}s`);
    }

    async function saveSettings(patch) {
      const settings = await api("/api/settings", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(patch)
      });
      state.paused = Boolean(settings.paused);
      state.settings = normalizeSettings(settings);
      renderCapture();
      renderSettingsMenu();
    }

    async function toggleCaptureFromSettings() {
      await saveSettings({ paused: !state.paused });
      toast(state.paused ? "Capture paused" : "Capture resumed");
    }

    async function editBlocklistSettings() {
      const current = state.settings.blocklist;
      const value = prompt("Domains, paths, and source apps to block", [
        ...current.domains.map(item => `domain:${item}`),
        ...current.paths.map(item => `path:${item}`),
        ...current.source_apps.map(item => `app:${item}`)
      ].join(", "));
      if (value === null) return;
      const entries = value.split(",").map(item => item.trim()).filter(Boolean);
      const blocklist = { domains: [], paths: [], source_apps: [] };
      for (const entry of entries) {
        if (entry.startsWith("path:")) blocklist.paths.push(entry.slice(5).trim());
        else if (entry.startsWith("app:")) blocklist.source_apps.push(entry.slice(4).trim());
        else if (entry.startsWith("domain:")) blocklist.domains.push(entry.slice(7).trim());
        else blocklist.domains.push(entry);
      }
      await saveSettings({ blocklist });
      toast("Blocklist saved");
    }

    async function editDedupSettings() {
      const value = prompt("Dedup window in seconds", String(state.settings.dedup_window_seconds || 60));
      if (value === null) return;
      const seconds = Number(value);
      if (!Number.isInteger(seconds) || seconds < 0 || seconds > 3600) {
        toast("Dedup window must be 0-3600 seconds");
        return;
      }
      await saveSettings({ dedup_window_seconds: seconds });
      toast("Dedup window saved");
    }

    async function toggleSuggestionSettings() {
      const current = state.settings.suggestions || {};
      await saveSettings({
        suggestions: {
          enabled: !current.enabled,
          cli_enabled: current.cli_enabled !== false,
          ide_enabled: current.ide_enabled !== false,
          min_chars: Number(current.min_chars || 24),
          limit: Number(current.limit || 3)
        }
      });
      toast(state.settings.suggestions.enabled ? "Suggestions enabled" : "Suggestions disabled");
    }

    async function editPruneSettings() {
      const current = state.settings.prune || {};
      const value = prompt("Prune defaults: days,shorter_than,source", [
        current.older_than_days || "",
        current.shorter_than || "",
        current.source || ""
      ].join(","));
      if (value === null) return;
      const [days, shorter, source] = value.split(",").map(item => item.trim());
      await saveSettings({
        prune: {
          older_than_days: days ? Number(days) : null,
          shorter_than: shorter ? Number(shorter) : null,
          source: source || null,
          dry_run: current.dry_run !== false
        }
      });
      toast("Prune defaults saved");
    }

    function findTagByName(name) {
      const normalized = name.toLowerCase();
      return state.tags.find(tag => String(tag.name).toLowerCase() === normalized);
    }

    function normalizeTagInput(value) {
      return value.trim().replace(/^#+/, "").trim();
    }

    async function deletePrompt(id) {
      if (!confirm("Delete this prompt? This cannot be undone.")) return;
      await api(`/api/prompts/${id}`, { method: "DELETE" });
      state.openPromptMenuId = "";
      if (state.selectedId === id) state.selectedId = "";
      toast("Prompt deleted");
      await loadPrompts();
    }

    async function deleteProject(project) {
      const count = Number(project.prompt_count || 0);
      const suffix = count > 0
        ? ` ${formatNumber(count)} prompts will remain and move to No project.`
        : "";
      if (!confirm(`Delete project "${project.name}"?${suffix}`)) return;
      await api(`/api/projects/${encodeURIComponent(project.id)}`, { method: "DELETE" });
      if (state.activeProject === project.id) state.activeProject = "";
      state.selectedProjectIds.delete(project.id);
      state.openProjectMenuId = "";
      toast("Project deleted");
      await loadInitial();
    }

    async function deleteSelectedProjects() {
      const selected = state.projects.filter(project => state.selectedProjectIds.has(project.id));
      if (!selected.length) return;
      const promptTotal = selected.reduce((sum, project) => sum + Number(project.prompt_count || 0), 0);
      const names = selected.length <= 3
        ? selected.map(project => `"${project.name}"`).join(", ")
        : `${selected.length} projects`;
      const suffix = promptTotal > 0
        ? ` ${formatNumber(promptTotal)} prompts will remain and move to No project.`
        : "";
      if (!confirm(`Delete ${names}?${suffix}`)) return;
      await Promise.all(selected.map(project =>
        api(`/api/projects/${encodeURIComponent(project.id)}`, { method: "DELETE" })
      ));
      if (selected.some(project => project.id === state.activeProject)) state.activeProject = "";
      state.selectedProjectIds.clear();
      state.openProjectMenuId = "";
      toast(selected.length === 1 ? "Project deleted" : `Deleted ${selected.length} projects`);
      await loadInitial();
    }

    async function resetStatistics() {
      if (!confirm("Reset copy and delete statistics? Prompt counts stay; only usage stats and the audit log are cleared.")) return;
      await api("/api/stats", { method: "POST" });
      toast("Statistics reset");
      await loadStats();
    }

    async function deleteSelectedPrompts() {
      const selected = visiblePromptIds().filter(id => state.selectedIds.has(id));
      if (!selected.length) return;
      if (!confirm(`Delete ${selected.length} selected prompts? This cannot be undone.`)) return;
      await Promise.all(selected.map(id => api(`/api/prompts/${id}`, { method: "DELETE" })));
      if (selected.includes(state.selectedId)) state.selectedId = "";
      toast(`Deleted ${selected.length} prompts`);
      clearSelection();
      await loadPrompts();
    }

    function menuInfo(label, value) {
      const row = el("div", "menu-row");
      row.append(textEl("span", label, "menu-label"), textEl("span", value));
      return row;
    }

    function menuButton(label, handler, active = false, iconName = "", extra = "") {
      const row = buttonEl(`menu-row ${active ? "active" : ""} ${extra}`.trim(), event => {
        event.stopPropagation();
        handler();
      });
      const left = el("span");
      left.style.display = "inline-flex";
      left.style.alignItems = "center";
      left.style.gap = "8px";
      if (iconName) left.append(icon(iconName));
      left.append(textEl("span", label));
      row.append(left);
      return row;
    }

    function detailRow(label, value) {
      const row = el("div", "detail-kv");
      row.append(textEl("span", label), textEl("span", value));
      return row;
    }

    function buttonEl(className, handler) {
      const node = document.createElement("button");
      node.type = "button";
      if (className) node.className = className;
      node.addEventListener("click", handler);
      return node;
    }

    function iconOnly(iconName, label) {
      const node = buttonEl("bare-icon", () => {});
      node.setAttribute("aria-label", label);
      node.title = label;
      node.replaceChildren(icon(iconName));
      return node;
    }

    function icon(name) {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", "icon-svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("fill", "none");
      svg.setAttribute("stroke", "currentColor");
      svg.setAttribute("stroke-width", "1.6");
      svg.setAttribute("stroke-linecap", "round");
      svg.setAttribute("stroke-linejoin", "round");
      svg.setAttribute("aria-hidden", "true");
      for (const [tag, attrs] of icons[name]) {
        const child = document.createElementNS("http://www.w3.org/2000/svg", tag);
        Object.entries(attrs).forEach(([key, value]) => child.setAttribute(key, value));
        svg.append(child);
      }
      return svg;
    }

    function el(tag, className = "") {
      const node = document.createElement(tag);
      if (className) node.className = className;
      return node;
    }

    function textEl(tag, text, className = "") {
      const node = el(tag, className);
      node.textContent = text;
      return node;
    }

    function sourceLabel(source) {
      const labels = { browser: "Browser", desktop: "Desktop", ide: "IDE", cli: "CLI", mcp: "MCP" };
      return labels[source] || source;
    }

    function sourceAppLabel(sourceApp) {
      const labels = {
        "claude-code": "Claude Code",
        "claude-vscode": "Claude VS Code",
        "claude-cursor": "Claude Cursor",
        "claude-desktop": "Claude Desktop",
        "codex": "Codex CLI",
        "codex-cli": "Codex CLI",
        "codex-desktop": "Codex Desktop",
        "codex-vscode": "Codex IDE",
        "codex-cursor": "Codex Cursor",
        "codex-ide": "Codex IDE",
        "cursor": "Cursor",
        "cursor-chat": "Cursor Chat",
        "claude.ai": "Claude.ai",
        "chatgpt.com": "ChatGPT"
      };
      return labels[sourceApp] || sourceApp;
    }

    function projectColor(prompt) {
      const project = state.projects.find(item => item.id === prompt.project_id);
      return project?.color || "#1f8a8a";
    }

    function metadataUrl(prompt) {
      const url = prompt.metadata?.url;
      return typeof url === "string" ? url : "";
    }

    function formatNumber(value) {
      return new Intl.NumberFormat().format(Number(value || 0));
    }

    function formatDecimal(value) {
      return new Intl.NumberFormat(undefined, { maximumFractionDigits: 1 }).format(Number(value || 0));
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "Unknown";
      return new Intl.DateTimeFormat(undefined, { year: "numeric", month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit" }).format(date);
    }

    function relativeTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Unknown";
      const seconds = Math.max(1, Math.round((Date.now() - date.getTime()) / 1000));
      const units = [["year", 31536000], ["month", 2592000], ["week", 604800], ["day", 86400], ["hour", 3600], ["minute", 60]];
      for (const [unit, size] of units) {
        if (seconds >= size) {
          const count = Math.floor(seconds / size);
          return `${count} ${unit}${count === 1 ? "" : "s"} ago`;
        }
      }
      return "just now";
    }

    function toast(text) {
      const node = textEl("div", text, "toast");
      els.toasts.append(node);
      setTimeout(() => node.remove(), 2600);
    }

    let debounce;
    els.search.addEventListener("input", () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        state.query = els.search.value.trim();
        state.active = state.active === "stats" || state.active === "tags" ? "all" : state.active;
        loadPrompts();
      }, 180);
    });

    els.capture.addEventListener("click", async () => {
      await api(state.paused ? "/api/capture/resume" : "/api/capture/pause", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: state.paused ? undefined : JSON.stringify({ reason: "manual" })
      });
      state.paused = !state.paused;
      renderCapture();
    });

    els.resumeBanner.addEventListener("click", async () => {
      await api("/api/capture/resume", { method: "POST" });
      state.paused = false;
      renderCapture();
    });

    els.sidebarToggle.addEventListener("click", () => {
      state.sidebarHidden = !state.sidebarHidden;
      localStorage.setItem("kg_sidebar_hidden", state.sidebarHidden ? "true" : "false");
      renderSidebar();
    });

    els.settings.addEventListener("click", event => {
      event.stopPropagation();
      state.settingsOpen = !state.settingsOpen;
      state.sortOpen = false;
      state.openProjectMenuId = "";
      renderProjects();
      syncMenus();
    });

    els.sortTrigger.addEventListener("click", event => {
      event.stopPropagation();
      state.sortOpen = !state.sortOpen;
      state.settingsOpen = false;
      state.openProjectMenuId = "";
      renderProjects();
      syncMenus();
    });

    els.favoriteFilter.addEventListener("click", () => {
      state.favoriteOnly = !state.favoriteOnly;
      state.active = state.favoriteOnly || state.active === "tags" ? "all" : state.active;
      loadPrompts();
    });

    els.selectAll.addEventListener("change", () => {
      toggleSelectAllVisible(els.selectAll.checked);
    });

    els.bulkCopy.addEventListener("click", () => copySelectedPrompts().catch(renderError));
    els.bulkFavorite.addEventListener("click", () => favoriteSelectedPrompts().catch(renderError));
    els.bulkDelete.addEventListener("click", () => deleteSelectedPrompts().catch(renderError));
    els.bulkClear.addEventListener("click", clearSelection);

    els.clearFilters.addEventListener("click", () => {
      clearFilters();
      loadPrompts();
    });

    els.projectsToggle.addEventListener("click", () => {
      state.projectsOpen = !state.projectsOpen;
      renderProjects();
    });

    els.projectsSelectAll.addEventListener("change", () => {
      toggleSelectAllProjects(els.projectsSelectAll.checked);
    });

    els.projectsDeleteSelected.addEventListener("click", () => {
      deleteSelectedProjects().catch(renderError);
    });

    els.detailClose.addEventListener("click", () => {
      state.selectedId = "";
      renderContent();
      renderDetail();
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".top-actions")) state.settingsOpen = false;
      if (!event.target.closest(".sort-wrap")) state.sortOpen = false;
      const hadPromptMenu = Boolean(state.openPromptMenuId);
      const hadProjectMenu = Boolean(state.openProjectMenuId);
      if (!event.target.closest(".row-actions")) state.openPromptMenuId = "";
      if (!event.target.closest(".project-actions")) state.openProjectMenuId = "";
      syncMenus();
      if (hadPromptMenu) renderContent();
      if (hadProjectMenu) renderProjects();
    });

    document.addEventListener("keydown", event => {
      const active = document.activeElement;
      const editing = active && ["INPUT", "TEXTAREA", "SELECT"].includes(active.tagName);
      if (event.key === "/" && !editing) {
        event.preventDefault();
        els.search.focus();
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "a" && !editing && state.active !== "stats" && state.active !== "tags" && state.prompts.length) {
        event.preventDefault();
        state.selectionMode = true;
        visiblePromptIds().forEach(id => state.selectedIds.add(id));
        renderContent();
        renderSelectionState();
      }
      if (event.key.toLowerCase() === "j" && !editing && !event.ctrlKey && !event.metaKey && !event.altKey) {
        event.preventDefault();
        selectPromptByDelta(1);
      }
      if (event.key.toLowerCase() === "k" && !editing && !event.ctrlKey && !event.metaKey && !event.altKey) {
        event.preventDefault();
        selectPromptByDelta(-1);
      }
      if (event.key.toLowerCase() === "f" && !editing && !event.ctrlKey && !event.metaKey && !event.altKey) {
        event.preventDefault();
        toggleSelectedFavorite();
      }
      if (event.key.toLowerCase() === "d" && !editing && !event.ctrlKey && !event.metaKey && !event.altKey) {
        event.preventDefault();
        deleteSelectedPromptFromKeyboard();
      }
      if (event.key === "Escape") {
        if (state.selectedIds.size) {
          clearSelection();
          return;
        }
        state.settingsOpen = false;
        state.sortOpen = false;
        state.openPromptMenuId = "";
        state.openProjectMenuId = "";
        syncMenus();
        renderContent();
        renderProjects();
      }
    });

    applyTheme(state.theme);
    loadInitial();
  </script>
</body>
</html>
